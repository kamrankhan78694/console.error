name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default to read-only token; jobs opt-in to writes if needed.
permissions:
  contents: read

jobs:
  test:
    name: Build + Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.0
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm build

      - run: pnpm test

      - name: Bundle-size budget
        run: node scripts/size-check.mjs
